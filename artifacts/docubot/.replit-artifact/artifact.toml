kind = "web"
previewPath = "/"
title = "DocuBOT"
version = "1.0.0"
id = "artifacts/docubot"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22247

[services.development]
run = "pnpm --filter @workspace/docubot run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/docubot", "run", "build" ]
publicDir = "artifacts/docubot/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22247"
BASE_PATH = "/"
