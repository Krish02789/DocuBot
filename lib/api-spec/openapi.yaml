openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: DocuBOT API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: documents
    description: Document upload and management
  - name: chat
    description: Chat with uploaded documents
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /upload:
    post:
      operationId: uploadDocument
      tags: [documents]
      summary: Upload a PDF document
      description: Upload a PDF file, extract text, chunk it, embed it, and store it in memory
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/UploadInput"
      responses:
        "200":
          description: Document uploaded and processed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UploadResponse"
        "400":
          description: Invalid file
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Processing error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /chat:
    post:
      operationId: chatWithDocument
      tags: [chat]
      summary: Chat with an uploaded document
      description: Ask a question about an uploaded document using RAG
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChatInput"
      responses:
        "200":
          description: AI response with source excerpts
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatResponse"
        "404":
          description: Document not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: AI service error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /documents:
    get:
      operationId: listDocuments
      tags: [documents]
      summary: List all loaded documents
      description: Returns all doc IDs currently stored in memory
      responses:
        "200":
          description: List of loaded document IDs
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DocumentList"

  /documents/{docId}:
    delete:
      operationId: deleteDocument
      tags: [documents]
      summary: Delete a document
      description: Remove a document and its vector store from memory
      parameters:
        - name: docId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Document deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteResponse"
        "404":
          description: Document not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    UploadInput:
      type: object
      properties:
        file:
          type: string
          format: binary
      required:
        - file

    UploadResponse:
      type: object
      properties:
        docId:
          type: string
        filename:
          type: string
        totalChunks:
          type: integer
        message:
          type: string
      required:
        - docId
        - filename
        - totalChunks
        - message

    ChatMessage:
      type: object
      properties:
        role:
          type: string
          enum: [user, assistant]
        content:
          type: string
      required:
        - role
        - content

    ChatInput:
      type: object
      properties:
        docId:
          type: string
        message:
          type: string
        history:
          type: array
          items:
            $ref: "#/components/schemas/ChatMessage"
      required:
        - docId
        - message

    ChatResponse:
      type: object
      properties:
        answer:
          type: string
        sources:
          type: array
          items:
            type: string
        docId:
          type: string
      required:
        - answer
        - sources
        - docId

    DocumentList:
      type: object
      properties:
        documents:
          type: array
          items:
            type: string
      required:
        - documents

    DeleteResponse:
      type: object
      properties:
        message:
          type: string
      required:
        - message

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error
